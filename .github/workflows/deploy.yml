name: Node.js CI/CD

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      working-directory: ./test-case-5/nodejs-api
      run: npm ci
      
    - name: Build the Docker image
      working-directory: ./test-case-5/nodejs-api
      run: docker build . --file Dockerfile --tag nodejs-api:latest
      
    - name: Deploy message
      run: echo "Deploying application to server..."
